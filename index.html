<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cr — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>

  <!-- <header class="top-header">
    <div class="header-logo">
      <div class="logo-icon">C</div>
      <span class="logo-text">CANVA-PLATFORM</span>
    </div>
  </header> -->

  <main>

  

    <div class="card">
      <!-- <div class="card-logo">
        <div class="logo-icon small-icon">C</div>
        <span class="logo-text">CANVA-PLATFORM</span>
      </div> -->
      <header class="top-header">
    <div class="header-logo">
      <div class="logo-icon">C</div>
      <span class="logo-text">CANVA-PLATFORM</span>
    </div>
  </header>

      <div class="form-panel active" id="panel-login">
        <!-- <h2>Welcome back!</h2> -->

        <div class="form-group" id="grp-login-email">
          <label>Email Address</label>
          <div class="input-wrap">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
            <input type="email" id="login-email" placeholder="Email Address" />
          </div>
          <div class="error-msg" id="err-login-email">Please enter a valid email</div>
        </div>

        <div class="form-group" id="grp-login-pass">
          <label>Password</label>
          <div class="input-wrap">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="login-pass" placeholder="Password" />
            <button class="eye-btn" onclick="togglePwd('login-pass', this)" type="button">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="error-msg" id="err-login-pass">Password is required</div>
        </div>

        <button class="btn-dark" onclick="handleLogin()">Login</button>
        
        <div class="forgot-row">
          <a href="#">Forgot Password?</a>
        </div>

        <div class="divider">or</div>

        <div class="social-btns">
          <button class="btn-social">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.4 1.2 8.8 3.2l6.5-6.5C35.3 2.5 30 .5 24 .5 14.8.5 7 6.3 3.5 14.3l7.6 5.9C13 14.3 18 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 7.1-10 7.1-17z"/><path fill="#FBBC05" d="M11.1 28.8A14.5 14.5 0 0 1 9.5 24c0-1.7.3-3.3.8-4.8L2.7 13.3A23.5 23.5 0 0 0 .5 24c0 3.8.9 7.4 2.5 10.6l8.1-5.8z"/><path fill="#34A853" d="M24 47.5c6 0 11.1-2 14.8-5.4l-7.5-5.8c-2 1.4-4.6 2.2-7.3 2.2-6 0-11-4.8-12.9-11.1l-8 5.9C7 41.7 14.8 47.5 24 47.5z"/></svg>
            <span>Sign up with Google</span>
          </button>
          <button class="btn-social">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.1.82-.26.82-.57v-2c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.23 1.84 1.23 1.07 1.83 2.8 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.3c0 .32.22.68.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
            <span>Sign up with GitHub</span>
          </button>
        </div>

      </div>
    </div>

      <div class="left-promo">
      <div class="illustration-container">
        <!-- <div class="badge badge-top">Start Creating SVGs</div>
        <div class="badge badge-bottom">Fast & Easy Conversion</div> -->
        
        <svg class="mountain-svg" viewBox="0 0 400 250" preserveAspectRatio="xMidYMax slice">
          <rect width="100%" height="100%" fill="#a3d5e0"/>
          <circle cx="100" cy="80" r="30" fill="#f4c430" stroke="#1c2333" stroke-width="2"/>
          <path d="M-50 250 L100 100 L250 250 Z" fill="#8b9bb4" stroke="#1c2333" stroke-width="2"/>
          <path d="M150 250 L250 120 L450 250 Z" fill="#6c7a8e" stroke="#1c2333" stroke-width="2"/>
          <path d="M100 100 L150 150 L100 150 Z" fill="#ffffff" stroke="#1c2333" stroke-width="2"/>
          <path d="M250 120 L290 170 L220 170 Z" fill="#ffffff" stroke="#1c2333" stroke-width="2"/>
          <path d="M0 200 Q 150 220 200 250 L0 250 Z" fill="#6db14b" stroke="#1c2333" stroke-width="2"/>
          <path d="M200 250 Q 250 220 400 200 L400 250 Z" fill="#58903c" stroke="#1c2333" stroke-width="2"/>
          <path d="M100 250 Q 150 230 250 250 Z" fill="#3a8fb7" stroke="#1c2333" stroke-width="2"/>
        </svg>
      </div>

      <button class="btn-blue-main">Sign Up for Free</button>
      
      <div class="left-footer">
        New here? <a href="#">Create an Account</a>
      </div>
    </div>

  </main>

  <script src="./js/main.js"></script>
</body>
</html>
